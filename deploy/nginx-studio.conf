# /etc/nginx/sites-available/studio
# Sanity Studio — static SPA bundle served at studio.tusharjaryal.in.
# TLS via the Cloudflare Origin cert (same as the main site); Sanity's own
# login gates who can actually read/edit content.

server {
    listen 80;
    listen [::]:80;
    server_name studio.tusharjaryal.in;
    return 301 https://studio.tusharjaryal.in$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name studio.tusharjaryal.in;

    ssl_certificate     /etc/ssl/tusharjaryal.in.pem;
    ssl_certificate_key /etc/ssl/tusharjaryal.in.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/studio/dist;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Optional extra hardening (Sanity login already protects content).
    # Uncomment to restrict to your own IP range, or add basic-auth:
    # allow 203.0.113.0/24;
    # deny all;
    # auth_basic "Studio";
    # auth_basic_user_file /etc/nginx/.studio_htpasswd;

    location / {
        try_files $uri /index.html;   # SPA fallback
    }
}
