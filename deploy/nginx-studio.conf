# /etc/nginx/sites-available/studio
# Sanity Studio: static SPA bundle. Sanity login is required to use it;
# optionally add an IP allowlist or basic-auth for defense in depth.

server {
    listen 80;
    server_name studio.tusharjaryal.dev;
    return 301 https://studio.tusharjaryal.dev$request_uri;
}

server {
    listen 443 ssl http2;
    server_name studio.tusharjaryal.dev;

    ssl_certificate     /etc/letsencrypt/live/studio.tusharjaryal.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studio.tusharjaryal.dev/privkey.pem;

    root /var/www/studio/dist;

    # Optional hardening — uncomment to restrict access:
    # allow 203.0.113.0/24;   # your office/home IP range
    # deny all;
    # auth_basic "Studio";
    # auth_basic_user_file /etc/nginx/.studio_htpasswd;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri /index.html;   # SPA fallback
    }
}
