# /etc/nginx/sites-available/portfolio
# Website: static files served directly; Home + /api/* proxied to the Node SSR runtime.

# Rate-limit zone for the API (define once, in http{} or here at top level via include).
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/m;

server {
    listen 80;
    server_name tusharjaryal.dev www.tusharjaryal.dev;
    return 301 https://tusharjaryal.dev$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tusharjaryal.dev;

    ssl_certificate     /etc/letsencrypt/live/tusharjaryal.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tusharjaryal.dev/privkey.pem;

    # Resolves through the promoted release symlink (see deploy.sh).
    root /var/www/portfolio/current/dist/client;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Long-cache hashed assets
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Home is server-rendered (prerender = false)
    location = / {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dynamic endpoints
    location /api/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else: static first, fall back to SSR for any on-demand route
    location / {
        try_files $uri $uri/ $uri.html @ssr;
    }

    location @ssr {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
