# /etc/nginx/sites-available/tusharjaryal.in
# Combined config for the live server:
#   - Portfolio website (Astro): static files from dist/client, Home + /api/* proxied to Node SSR on :4321
#   - vpn.tusharjaryal.in: reverse proxy to OpenVPN Access Server on :943 (preserved from prior config)
# TLS: Cloudflare Origin certificate already installed at /etc/ssl/tusharjaryal.in.{pem,key}.

# Rate-limit zone for the API (http{} context — sites-enabled is included inside http{}).
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/m;

# HTTP → HTTPS for every host on this domain.
server {
    listen 80;
    listen [::]:80;
    server_name tusharjaryal.in www.tusharjaryal.in vpn.tusharjaryal.in;
    return 301 https://$host$request_uri;
}

# Redirect www → apex over HTTPS.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.tusharjaryal.in;

    ssl_certificate     /etc/ssl/tusharjaryal.in.pem;
    ssl_certificate_key /etc/ssl/tusharjaryal.in.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    return 301 https://tusharjaryal.in$request_uri;
}

# Portfolio website: static client assets served directly; Home + /api/* proxied to the Node SSR runtime.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tusharjaryal.in;

    ssl_certificate     /etc/ssl/tusharjaryal.in.pem;
    ssl_certificate_key /etc/ssl/tusharjaryal.in.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Resolves through the promoted release symlink (see deploy/deploy.sh).
    root /var/www/portfolio/current/dist/client;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Long-cache hashed assets
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Home is server-rendered (prerender = false)
    location = / {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dynamic endpoints
    location /api/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else: static first, fall back to SSR for any on-demand route
    location / {
        try_files $uri $uri/ $uri.html @ssr;
    }

    location @ssr {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# OpenVPN Access Server reverse proxy (unchanged from prior config).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vpn.tusharjaryal.in;

    ssl_certificate     /etc/ssl/tusharjaryal.in.pem;
    ssl_certificate_key /etc/ssl/tusharjaryal.in.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass https://127.0.0.1:943;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 90s;
    }
}
